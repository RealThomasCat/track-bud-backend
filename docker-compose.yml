services:
  # TrackBud Express API for local Docker development.
  backend:
    build:
      # Use the current folder as the Docker build context.
      context: .
      # Build only up to the dev stage in the Dockerfile.
      target: dev
    container_name: trackbud-backend
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      # Exposes the API to the host machine.
      - "${BACKEND_PORT:-5000}:5000"
    volumes:
      # Mount source files for live reload without mounting local .env.
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
      - ./tsconfig.json:/app/tsconfig.json

      # Keep container dependencies separate from host node_modules.
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # No startup command in compose because Dockerfile dev CMD already handles it

  # Local PostgreSQL database for development.
  postgres:
    image: postgres:16-alpine
    container_name: trackbud-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trackbud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trackbud_password}
      POSTGRES_DB: ${POSTGRES_DB:-track_bud}
    ports:
      # Optional local access for DB tools; backend uses postgres:5432 internally.
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      # Persist database data across container restarts.
      - trackbud_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Local Redis instance for caching.
  redis:
    image: redis:7-alpine
    container_name: trackbud-redis
    restart: unless-stopped
    ports:
      # Optional local access for Redis tools; backend uses redis:6379 internally.
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      # Persist Redis data when AOF persistence is enabled.
      - trackbud_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  trackbud_postgres_data:
  trackbud_redis_data: